name: Build and Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    concurrency: ci-${{ github.ref }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20]
    steps:
      - name: Checkout ️
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }} ♨️
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Create .env file (Secure Secret)
        run: |
          echo "API_KEY=${{ secrets.<YOUR_SECRET_NAME> }}" >> .env
        env:
          # Mask the secret value in logs
          <YOUR_SECRET_NAME>: ${{ secrets.<YOUR_SECRET_NAME> }}

      - name: Install & Generate
        run: |
          npm ci
          npm run generate
        env:
          NUXT_APP_BASE_URL: ${{ vars.NUXT_APP_BASE_URL }}

      - name: Create .nojekyll file
        run: touch .nojekyll

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
