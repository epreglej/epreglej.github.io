name: Build and Deploy
on:
  push:
    branches:
      - main
permissions:
  contents: write
jobs:
  build-and-deploy:
    concurrency: ci-${{ github.ref }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20]
    steps:
    - name: Checkout ğŸ›ï¸
      uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }} â™¨ï¸
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}

    - name: Install & Generate ğŸ”§
      run: |
        npm ci
        npm run generate
      env:
        NUXT_APP_BASE_URL: ${{ vars.NUXT_APP_BASE_URL  }}
    
    - name: Create .nojekyll file ğŸ§ª
      run: touch .nojekyll

    - name: Deploy ğŸš€
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        folder: dist
